stages:
  - sonarqube-check
  - build_docker

# Variables for SonarQube should be defined in GitLab CI/CD settings:
# SONAR_HOST_URL: "http://your-sonarqube-server"
# SONAR_TOKEN: "your-sonarqube-token"

# --- Etape 1 : Analyse du code avec SonarQube ---
sonarqube-check:
  stage: sonarqube-check
  image: 
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  variables:
    # Defines the location of the analysis task cache
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"  
    # Tells git to fetch all branches
    GIT_DEPTH: "0"  
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script: 
    - sonar-scanner
  allow_failure: true
  only:
    - main
    - master
    - merge_requests

# --- Etape 2 : Construction des images Docker ---
build_backend:
  stage: build_docker
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - cd backend
    - docker build -t registry.gitlab.com/votre-user/app-partage-fichier/backend:latest .
    # Décommentez pour pousser l'image vers GitLab Container Registry
    # - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    # - docker push registry.gitlab.com/votre-user/app-partage-fichier/backend:latest
  only:
    - main
    - master

build_frontend:
  stage: build_docker
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - cd frontend
    - docker build -t registry.gitlab.com/votre-user/app-partage-fichier/frontend:latest .
    # Décommentez pour pousser l'image vers GitLab Container Registry
    # - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    # - docker push registry.gitlab.com/votre-user/app-partage-fichier/frontend:latest
  only:
    - main
    - master
