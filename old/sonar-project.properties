# Clé unique pour votre projet sur le serveur SonarQube
sonar.projectKey=AppPartageFichier
sonar.projectName=App Partage Fichier
sonar.sourceEncoding=UTF-8

# Dossiers sources à analyser (séparés par des virgules)
sonar.sources=backend/src,frontend/src

# Fichiers ou dossiers à exclure de l'analyse (dépendances et builds)
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.test.*,**/*.spec.*

# Optionnel: Lieux des rapports de test de couverture (si des tests unitaires sont ajoutés)
# sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
# sonar.typescript.lcov.reportPaths=backend/coverage/lcov.info
